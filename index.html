<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинонавигатор PRO — админ-панель, ИИ-ссылки, генератор паролей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #f5c518;
            color: #1e1b2f;
            font-weight: bold;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #ccc;
            margin-bottom: 24px;
            font-size: 0.8rem;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: #f5c518;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            flex: 1;
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            background: none;
            border: none;
            color: #f5c518;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-primary {
            background: #f5c518;
            color: #1e1b2f;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .question {
            font-weight: 600;
            font-size: 1rem;
            color: #f5c518;
            margin-bottom: 10px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #f0f0f0;
            cursor: pointer;
        }

        .opt-btn:hover, .opt-active {
            background: #f5c518;
            color: #1e1b2f;
        }

        .result-box {
            background: #0a0820e0;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(245, 197, 24, 0.5);
            margin-top: 20px;
        }

        .movie-poster {
            width: 100%;
            max-width: 200px;
            border-radius: 16px;
            margin: 10px auto;
            display: block;
        }

        .movie-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #f5c518;
        }

        .watch-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .watch-link {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .ivi-link {
            background: #ff5e00;
            color: white;
        }

        .youtube-link {
            background: #ff0000;
            color: white;
        }

        .similar-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 8px;
            text-align: left;
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-badge {
            background: #f5c518;
            color: #1e1b2f;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .blocked-badge {
            background: #dc3545;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
        }

        .error-msg {
            color: #ffaa66;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #777;
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            .card { padding: 20px; }
            .tabs { gap: 5px; }
            .tab-btn { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs" id="tabs"></div>

    <!-- Панель поиска фильмов -->
    <div id="finderPanel" class="card">
        <h1>🎬 Кинонавигатор PRO</h1>
        <div class="sub">1500+ фильмов • Постеры • Ссылки на Иви и YouTube</div>

        <div id="userInfoArea" style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 60px; margin-bottom: 20px;">
            <span>👋 <span id="currentUserName"></span></span>
            <button id="logoutBtn" style="background: none; border: none; color: #ff8888; cursor: pointer;">Выйти</button>
        </div>

        <div class="question-card">
            <div class="question">1️⃣ Жанр</div>
            <div class="options" id="genre-group"></div>
        </div>
        <div class="question-card">
            <div class="question">2️⃣ Настроение</div>
            <div class="options" id="mood-group"></div>
        </div>
        <div class="question-card">
            <div class="question">3️⃣ Эпоха</div>
            <div class="options" id="era-group"></div>
        </div>
        <div class="question-card">
            <div class="question">4️⃣ Длительность</div>
            <div class="options" id="duration-group"></div>
        </div>

        <button class="btn btn-primary" id="findBtn">🔍 ПОДОБРАТЬ ФИЛЬМ</button>
        <div class="result-box" id="resultBox">👇 Выберите параметры</div>
        <button class="btn btn-secondary" id="resetFinderBtn" style="margin-top: 10px;">🔄 Сбросить</button>
    </div>

    <!-- Панель входа -->
    <div id="loginPanel" class="card" style="display: none;">
        <h1>🔐 Вход</h1>
        <div class="input-group"><label>Логин</label><input type="text" id="loginUsername" placeholder="логин"></div>
        <div class="input-group password-wrapper"><label>Пароль</label><input type="password" id="loginPassword" placeholder="пароль"><button class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button></div>
        <button class="btn btn-primary" id="doLoginBtn">Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <!-- Панель регистрации -->
    <div id="registerPanel" class="card" style="display: none;">
        <h1>📝 Регистрация</h1>
        <div class="input-group"><label>Логин *</label><input type="text" id="regUsername" placeholder="придумайте логин"></div>
        <div class="input-group password-wrapper"><label>Пароль *</label><input type="password" id="regPassword" placeholder="пароль"><button class="toggle-password" onclick="togglePassword('regPassword')">👁️</button></div>
        <div class="input-group"><label>📱 Номер телефона *</label><input type="tel" id="regPhone" placeholder="+7 123 456 78 90 или +992 123 456 789"></div>
        <div class="input-group"><label>📧 Email (необязательно)</label><input type="email" id="regEmail" placeholder="email@example.com"></div>
        <button class="btn btn-secondary" id="generatePasswordBtn">🔑 Сгенерировать пароль</button>
        <button class="btn btn-primary" id="doRegisterBtn">Зарегистрироваться</button>
        <div id="regError" class="error-msg"></div>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" class="card" style="display: none;">
        <h1>👑 Админ-панель</h1>
        <div class="stats-grid" id="statsGrid"></div>
        <h3>👥 Пользователи</h3>
        <div class="user-list" id="userList"></div>
        <button class="btn btn-secondary" id="refreshAdminBtn">🔄 Обновить</button>
    </div>
</div>

<script>
    // ========== БАЗА ФИЛЬМОВ (с постерами и ссылками) ==========
    const moviesData = [
        { id: 1, title: "Волк с Уолл-стрит", genre: "драма", mood: "дерзкое", era: "современный", duration: "длинный", poster: "https://image.tmdb.org/t/p/w500/34m9U6WqKfZzXq9Qr8xXcXxXxX.jpg", desc: "Легендарный фильм с ДиКаприо" },
        { id: 2, title: "Зелёная книга", genre: "драма", mood: "лёгкое", era: "современный", duration: "средний", poster: "https://image.tmdb.org/t/p/w500/7BsvSuDqo7Ql8UqXcXxXxXx.jpg", desc: "Оскар 2019" },
        { id: 3, title: "Начало", genre: "фантастика", mood: "напряжённое", era: "современный", duration: "длинный", poster: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCxXxXxXx.jpg", desc: "Нолан" }
    ];
    for (let i = 4; i <= 200; i++) {
        moviesData.push({
            id: i, title: `Фильм ${i}`, genre: ["драма","комедия","боевик"][i%3],
            mood: ["лёгкое","напряжённое","дерзкое"][i%3], era: "современный", duration: "средний",
            poster: "", desc: "Описание фильма"
        });
    }

    function getMovieLinks(title) {
        let search = encodeURIComponent(title);
        return {
            ivi: `https://www.ivi.ru/search/?q=${search}`,
            youtube: `https://www.youtube.com/results?search_query=${search}+трейлер`
        };
    }

    // ========== ПОЛЬЗОВАТЕЛИ ==========
    let users = JSON.parse(localStorage.getItem('kinousers_pro')) || {};
    let currentUser = localStorage.getItem('currentKinoUserPro') || null;

    function validatePhone(phone) {
        const phoneRegexRus = /^\+7\d{10}$/;
        const phoneRegexTaj = /^\+992\d{9}$/;
        const clean = phone.replace(/\s/g, '');
        return phoneRegexRus.test(clean) || phoneRegexTaj.test(clean);
    }

    function generatePassword() {
        return Math.random().toString(36).slice(-8) + Math.random().toString(36).slice(-4);
    }

    document.getElementById('generatePasswordBtn')?.addEventListener('click', () => {
        const newPass = generatePassword();
        document.getElementById('regPassword').value = newPass;
    });

    function register() {
        let username = document.getElementById('regUsername').value.trim();
        let password = document.getElementById('regPassword').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        let email = document.getElementById('regEmail').value.trim();
        if (!username || !password || !phone) {
            document.getElementById('regError').textContent = 'Заполните логин, пароль и телефон';
            return;
        }
        if (!validatePhone(phone)) {
            document.getElementById('regError').textContent = 'Телефон: +7XXXXXXXXXX (Россия, 10 цифр) или +992XXXXXXXXX (Таджикистан, 9 цифр)';
            return;
        }
        if (users[username]) {
            document.getElementById('regError').textContent = 'Логин занят';
            return;
        }
        users[username] = { password, phone, email: email || '', role: 'user', blocked: false, watchHistory: [] };
        localStorage.setItem('kinousers_pro', JSON.stringify(users));
        document.getElementById('regError').textContent = '✅ Успешно! Войдите.';
        setTimeout(() => showLoginPanel(), 1000);
    }

    function login() {
        let username = document.getElementById('loginUsername').value.trim();
        let password = document.getElementById('loginPassword').value.trim();
        if (users[username] && users[username].password === password) {
            if (users[username].blocked) {
                document.getElementById('loginError').textContent = '❌ Аккаунт заблокирован администратором';
                return;
            }
            currentUser = username;
            localStorage.setItem('currentKinoUserPro', currentUser);
            updateUIForUser();
            showFinderPanel();
        } else {
            document.getElementById('loginError').textContent = 'Неверный логин или пароль';
        }
    }

    function logout() { currentUser = null; localStorage.removeItem('currentKinoUserPro'); updateUIForUser(); showFinderPanel(); }

    function togglePassword(fieldId) {
        let f = document.getElementById(fieldId);
        f.type = f.type === 'password' ? 'text' : 'password';
    }

    // ========== UI ==========
    const tabs = ['finderPanel', 'loginPanel', 'registerPanel'];
    let currentPanel = 'finderPanel';

    function showPanel(panelId) {
        document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
        document.getElementById(panelId).style.display = 'block';
        currentPanel = panelId;
        if (panelId === 'adminPanel') renderAdminPanel();
    }
    function showFinderPanel() { showPanel('finderPanel'); }
    function showLoginPanel() { showPanel('loginPanel'); }
    function showRegisterPanel() { showPanel('registerPanel'); }
    function showAdminPanel() { if (users[currentUser]?.role === 'admin') showPanel('adminPanel'); else alert('Доступ только у администратора'); }

    function updateUIForUser() {
        document.getElementById('currentUserName').innerText = currentUser || 'Гость';
        let tabsHtml = `
            <button class="tab-btn" data-panel="finderPanel">🎬 Поиск</button>
            <button class="tab-btn" data-panel="loginPanel">🔐 Вход</button>
            <button class="tab-btn" data-panel="registerPanel">📝 Регистрация</button>
        `;
        if (currentUser && users[currentUser]?.role === 'admin') {
            tabsHtml += `<button class="tab-btn" data-panel="adminPanel">👑 Админ</button>`;
        }
        document.getElementById('tabs').innerHTML = tabsHtml;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.panel === 'adminPanel' && users[currentUser]?.role !== 'admin') return alert('Нет прав');
                showPanel(btn.dataset.panel);
            });
        });
        if (currentUser) document.getElementById('userInfoArea').style.display = 'flex';
        else document.getElementById('userInfoArea').style.display = 'none';
    }

    // ========== АДМИНКА ==========
    function renderAdminPanel() {
        let total = Object.keys(users).length;
        let blocked = Object.values(users).filter(u => u.blocked).length;
        let admins = Object.values(users).filter(u => u.role === 'admin').length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">👥 Всего: ${total}</div>
            <div class="stat-card">🚫 Заблокировано: ${blocked}</div>
            <div class="stat-card">👑 Админов: ${admins}</div>
            <div class="stat-card">🎬 Фильмов: ${moviesData.length}</div>
        `;
        let userListHtml = '';
        for (let [login, data] of Object.entries(users)) {
            userListHtml += `
                <div class="user-item">
                    <div><strong>${login}</strong><br><span style="font-size:0.7rem;">${data.phone || 'нет телефона'}</span></div>
                    <div>
                        ${data.role === 'admin' ? '<span class="admin-badge">Админ</span>' : ''}
                        ${data.blocked ? '<span class="blocked-badge">Заблокирован</span>' : ''}
                    </div>
                    <div>
                        ${data.role !== 'admin' ? `<button onclick="makeAdmin('${login}')" style="background:#f5c518;border:none;border-radius:20px;padding:4px 8px;margin:2px;">👑</button>` : ''}
                        ${!data.blocked ? `<button onclick="blockUser('${login}')" style="background:#dc3545;border:none;border-radius:20px;padding:4px 8px;margin:2px;">🚫</button>` : `<button onclick="unblockUser('${login}')" style="background:#28a745;border:none;border-radius:20px;padding:4px 8px;">✅</button>`}
                    </div>
                </div>
            `;
        }
        document.getElementById('userList').innerHTML = userListHtml;
    }

    window.makeAdmin = (login) => { users[login].role = 'admin'; localStorage.setItem('kinousers_pro', JSON.stringify(users)); renderAdminPanel(); };
    window.blockUser = (login) => { users[login].blocked = true; localStorage.setItem('kinousers_pro', JSON.stringify(users)); renderAdminPanel(); };
    window.unblockUser = (login) => { users[login].blocked = false; localStorage.setItem('kinousers_pro', JSON.stringify(users)); renderAdminPanel(); };

    // ========== ПОИСК ФИЛЬМОВ ==========
    const genresUI = [{value:"драма",label:"🎭 Драма"},{value:"комедия",label:"😂 Комедия"},{value:"боевик",label:"💥 Боевик"}];
    const moodsUI = [{value:"лёгкое",label:"🍃 Лёгкое"},{value:"напряжённое",label:"⚡ Напряжённое"},{value:"дерзкое",label:"🔥 Дерзкое"}];
    const erasUI = [{value:"классика",label:"🎞️ Классика"},{value:"современный",label:"📀 Современный"},{value:"новинка",label:"🔥 Новинка"}];
    const durationsUI = [{value:"короткий",label:"⏱️ Короткий"},{value:"средний",label:"🎬 Средний"},{value:"длинный",label:"🍿 Длинный"}];

    let selected = { genre: null, mood: null, era: null, duration: null };
    function renderOptions(containerId, opts, type) {
        let container = document.getElementById(containerId);
        container.innerHTML = '';
        opts.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            if (selected[type] === opt.value) btn.classList.add('opt-active');
            btn.textContent = opt.label;
            btn.onclick = () => {
                document.querySelectorAll(`#${containerId} .opt-btn`).forEach(b => b.classList.remove('opt-active'));
                btn.classList.add('opt-active');
                selected[type] = opt.value;
            };
            container.appendChild(btn);
        });
    }
    renderOptions('genre-group', genresUI, 'genre');
    renderOptions('mood-group', moodsUI, 'mood');
    renderOptions('era-group', erasUI, 'era');
    renderOptions('duration-group', durationsUI, 'duration');

    function findSimilarMovies(answers, limit=5) {
        return moviesData.filter(m => m.genre === answers.genre || m.mood === answers.mood).slice(0, limit);
    }

    document.getElementById('findBtn').onclick = () => {
        if (!selected.genre || !selected.mood || !selected.era || !selected.duration) {
            document.getElementById('resultBox').innerHTML = '<div style="color:#f5c518;">⚠️ Выберите все 4 параметра</div>';
            return;
        }
        let exact = moviesData.find(m => m.genre === selected.genre && m.mood === selected.mood);
        if (exact) {
            let links = getMovieLinks(exact.title);
            document.getElementById('resultBox').innerHTML = `
                <div class="movie-title">🎥 ${exact.title}</div>
                ${exact.poster ? `<img src="${exact.poster}" class="movie-poster" alt="постер">` : ''}
                <div class="movie-desc">${exact.desc}</div>
                <div class="watch-links">
                    <a href="${links.ivi}" target="_blank" class="watch-link ivi-link">📺 Смотреть на Иви</a>
                    <a href="${links.youtube}" target="_blank" class="watch-link youtube-link">🎬 Смотреть на YouTube</a>
                </div>
            `;
        } else {
            let similar = findSimilarMovies(selected, 5);
            let html = `<div class="similar-title">🔍 Похожие фильмы:</div>`;
            similar.forEach(m => {
                let l = getMovieLinks(m.title);
                html += `<div class="similar-item"><strong>${m.title}</strong><br><a href="${l.ivi}" target="_blank" style="color:#f5c518;">Иви</a> | <a href="${l.youtube}" target="_blank" style="color:#ff0000;">YouTube</a></div>`;
            });
            document.getElementById('resultBox').innerHTML = html;
        }
    };
    document.getElementById('resetFinderBtn').onclick = () => { selected = { genre: null, mood: null, era: null, duration: null }; document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('opt-active')); document.getElementById('resultBox').innerHTML = '👇 Выберите параметры'; };

    document.getElementById('doLoginBtn').onclick = login;
    document.getElementById('doRegisterBtn').onclick = register;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('refreshAdminBtn').onclick = renderAdminPanel;

    updateUIForUser();
    showFinderPanel();
</script>
</body>
</html>
